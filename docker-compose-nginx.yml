
networks:
  cyber-dojo:
    driver: bridge

services:

  nginx:
    image: ${CYBER_DOJO_NGINX_IMAGE}:${CYBER_DOJO_NGINX_TAG}
    depends_on:
      - web
    user: root
    init: true
    ports: [ "${CYBER_DOJO_NGINX_HOST_PORT}:80" ]
    restart: "no"

  # for demo
  web:
    depends_on:
      - creator
      - dashboard
      - differ
