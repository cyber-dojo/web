
networks:
  cyber-dojo:
    driver: bridge

services:

  asset_builder:
    image: ${CYBER_DOJO_ASSET_BUILDER_IMAGE}:${CYBER_DOJO_ASSET_BUILDER_TAG}
    platform: linux/amd64
    user: nobody
    container_name: ${CYBER_DOJO_ASSET_BUILDER_CONTAINER_NAME}
    ports: [ "${CYBER_DOJO_ASSET_BUILDER_PORT}:${CYBER_DOJO_ASSET_BUILDER_PORT}" ]
    env_file: [ .env.asset_builder ]
    read_only: true
    restart: no
    volumes:
      - ./source/app/assets/stylesheets:/app/app/assets/stylesheets:ro
      - ./source/app/assets/javascripts:/app/app/assets/javascripts:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  web:
    image: ${CYBER_DOJO_WEB_IMAGE}:${CYBER_DOJO_WEB_TAG}
    platform: linux/amd64
    build:
      context: .
      args:
        - COMMIT_SHA
        - BASE_IMAGE
    user: nobody
    env_file: [ web.env ]
    restart: no
    volumes:
      - ./bin/create_v2_kata.rb:/cyber-dojo/script/create_v2_kata.rb:ro
      - ./source/app:/web/source/app:ro
      - ./source/test:/web/source/test:ro
      - ./source/lib:/web/source/lib:ro

  creator:
    image: ${CYBER_DOJO_CREATOR_IMAGE}:${CYBER_DOJO_CREATOR_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  custom-start-points:
    image: ${CYBER_DOJO_CUSTOM_START_POINTS_IMAGE}:${CYBER_DOJO_CUSTOM_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  exercises-start-points:
    image: ${CYBER_DOJO_EXERCISES_START_POINTS_IMAGE}:${CYBER_DOJO_EXERCISES_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  languages-start-points:
    image: ${CYBER_DOJO_LANGUAGES_START_POINTS_IMAGE}:${CYBER_DOJO_LANGUAGES_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  runner:
    image: ${CYBER_DOJO_RUNNER_IMAGE}:${CYBER_DOJO_RUNNER_TAG}
    platform: linux/amd64
    user: root
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no
    volumes: [ "/var/run/docker.sock:/var/run/docker.sock" ]

  saver:
    image: ${CYBER_DOJO_SAVER_IMAGE}:${CYBER_DOJO_SAVER_TAG}
    platform: linux/amd64
    user: root
    env_file: [ .env ]
    read_only: true
    restart: no
    tmpfs: [ "/cyber-dojo:uid=19663,gid=65533", "/tmp:uid=19663,gid=65533" ]

  differ:
    image: ${CYBER_DOJO_DIFFER_IMAGE}:${CYBER_DOJO_DIFFER_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  dashboard:
    image: ${CYBER_DOJO_DASHBOARD_IMAGE}:${CYBER_DOJO_DASHBOARD_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    restart: no
    tmpfs: /tmp
